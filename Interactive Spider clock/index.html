<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Spider Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <div class="clock">
            <div class="spider" id="spider">🕷️</div>
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>

        <section class="subscribe-card">
            <p class="subscribe-label">Subscribe to my YouTube channel</p>
            <a class="subscribe-link" href="https://www.youtube.com/@iqram-visual" target="_blank" rel="noopener noreferrer">
                YouTube: @iqram-visual
            </a>
            <p class="subscribe-story">
                Every new video is a small story of creativity, design, and coding. If you enjoy watching ideas turn into something real, hit subscribe and join the journey.
            </p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
<audio id="tick-sound" src="tick.mp3" preload="auto"></audio>
